name: Build and Push

on:
  push:
    branches:
      [ master ]

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    name: Build AMD64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image (AMD64)
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/videogen:${{ github.sha }}-amd64,${{ secrets.DOCKER_USERNAME }}/videogen:latest-amd64

  build-arm64:
    runs-on: ubuntu-latest
    name: Build ARM64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image (ARM64)
        uses: docker/build-push-action@v6
        with:
          platforms: linux/arm64
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/videogen:${{ github.sha }}-arm64,${{ secrets.DOCKER_USERNAME }}/videogen:latest-arm64

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Render
    needs: [build-amd64, build-arm64]
    steps:
      - name: Trigger Render Deploy
        if: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
